services:
  - type: web
    name: merged-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
